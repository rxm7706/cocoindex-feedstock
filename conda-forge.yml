github:
  branch_name: main
  tooling_branch_name: main
conda_build:
  error_overlinking: true
conda_forge_output_validation: true
workflow_settings:
  # EXPERIMENT (Option A): unscoped — enabled on every platform
  # including win_64. The Windows INetCache ACL issue (CFE skill G18)
  # is mitigated at the recipe level via `recipe/recipe.yaml`'s
  # `build.script.env.LOCALAPPDATA` redirect — wininet writes its IE
  # cache to `C:\Temp\cocoindex_appdata` instead of inside the
  # rattler-build work tree, so the post-build 7z archive step
  # succeeds. If win Azure CI on this branch goes green, this restores
  # the v8.14.0 `pr-artifacts` smoke-test workflow on all five subdirs
  # AND validates the LOCALAPPDATA-redirect pattern for any future
  # Rust+PyO3 feedstock that wants Windows artifacts archived. If win
  # CI fails the same way as before the LOCALAPPDATA env var was
  # added, the redirect doesn't work under rattler-build's strict
  # env-isolation and we revert to the scoped form (G18 workaround
  # stays). Either outcome is a useful result; the experiment is
  # opt-in via this separate PR rather than the merged platform
  # expansion at PR #9.
  store_build_artifacts: true
provider:
  linux_aarch64: default
  osx_arm64: default
bot:
  automerge: true
  inspection: update-grayskull
  check_solvable: true
  run_deps_from_wheel: true
conda_install_tool: pixi
conda_build_tool: rattler-build
